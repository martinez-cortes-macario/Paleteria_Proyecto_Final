

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Paletería</title>


    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fff5f5;
            margin: 0;
        }


        nav {
            background: #ff4d6d;
            padding: 15px;
            text-align: center;
        }


        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }


        h1, h2 {
            text-align: center;
            color: #ff4d6d;
        }


        .container {
            padding: 20px;
        }


        .card {
            background: white;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }


        button {
            background: #80ed99;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>


<!-- 🔥 NAVBAR FUNCIONAL -->
<nav>
    <a href="/">Inicio</a>
    <a href="/productos/">Productos</a>
    <a href="/about/">Nosotros</a>
    <a href="/carrito/">Carrito</a>

    {% if user.is_authenticated %}

        <span style="color:white; margin-left:20px;">
            Hola, {{ user.username }} 👋
        </span>

        <a href="/logout/">Cerrar sesión</a>

    {% else %}

        <a href="/login/">Login</a>
        <a href="/register/">Registrarse</a>

    {% endif %}
</nav>


<div class="container">
    {% block content %}
    {% endblock %}
</div>


</body>
</html>
